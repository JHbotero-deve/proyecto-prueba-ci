<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival DevOps 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card-container">
        <header class="card-header">
            <div class="logo-icon">
                <i class="fas fa-infinity animate-pulse"></i>
            </div>
            <h1>Festival DevOps 2026</h1>
            <p class="subtitle">Automatización & Integración Continua</p>
        </header>

        <section class="status-box">
            <div class="status-indicator">
                <span class="dot-online"></span>
                <p>Entorno de Producción: <strong>Activo</strong></p>
            </div>
            <p class="status-desc">Validaciones de GitHub Actions completadas con éxito.</p>
        </section>

        <main class="features-grid">
            <div class="feature-card">
                <i class="fas fa-file-code icon-html"></i>
                <h3>HTML5</h3>
                <p>Estructura semántica limpia.</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-paint-brush icon-css"></i>
                <h3>CSS3</h3>
                <p>Diseño responsivo y moderno.</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-terminal icon-js"></i>
                <h3>JavaScript</h3>
                <p>Consola de verificación activa.</p>
            </div>
        </main>

        <footer class="card-footer">
            <button id="btn-verificar" class="btn-primary">
                <i class="fas fa-sync-alt"></i> Probar Conexión
            </button>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
